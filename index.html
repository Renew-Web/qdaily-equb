<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好奇心日报 归档</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: .05em; }
    header p  { margin-top: .4rem; font-size: .85rem; color: #aaa; }

    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .year-group { margin-bottom: 2.5rem; }
    .year-label {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: .75rem;
      padding-bottom: .4rem;
      border-bottom: 1px solid #ddd;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .75rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 1rem .75rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: box-shadow .15s, transform .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
    }
    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      transform: translateY(-2px);
    }

    .card-icon { font-size: 2rem; line-height: 1; }
    .card-month {
      font-size: .8rem;
      font-weight: 600;
      color: #333;
    }
    .card-year-mini {
      font-size: .7rem;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <h1>好奇心日报 归档</h1>
  <p>2014 — 2019 · 共 62 期</p>
</header>

<main id="main"></main>

<script>
  // 生成期刊列表（2014-04 ~ 2019-05）
  const books = [];
  for (let year = 2014; year <= 2019; year++) {
    const startMonth = year === 2014 ? 4 : 1;
    const endMonth   = year === 2019 ? 5 : 12;
    for (let m = startMonth; m <= endMonth; m++) {
      const mm = String(m).padStart(2, '0');
      books.push({ year, month: mm });
    }
  }

  // 按年分组
  const byYear = books.reduce((acc, b) => {
    (acc[b.year] = acc[b.year] || []).push(b);
    return acc;
  }, {});

  const MONTH_ZH = ['一月','二月','三月','四月','五月','六月',
                    '七月','八月','九月','十月','十一月','十二月'];

  const main = document.getElementById('main');

  Object.keys(byYear).sort().forEach(year => {
    const section = document.createElement('div');
    section.className = 'year-group';

    const label = document.createElement('div');
    label.className = 'year-label';
    label.textContent = year;
    section.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'cards';

    byYear[year].forEach(({ month }) => {
      const filename = `好奇心日报 ${year}-${month}.epub`;
      const a = document.createElement('a');
      a.className = 'card';
      a.href = `reader.html?book=${encodeURIComponent(filename)}`;
      a.innerHTML = `
        <div class="card-icon">📖</div>
        <div class="card-month">${MONTH_ZH[parseInt(month, 10) - 1]}</div>
        <div class="card-year-mini">${year}</div>
      `;
      grid.appendChild(a);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
</script>
</body>
</html>
