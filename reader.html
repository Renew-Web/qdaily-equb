<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>好奇心日报 阅读器</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #1a1a1a;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 顶部导航栏 ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: .6rem 1rem;
      background: #111;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
      min-height: 48px;
    }

    #btn-back {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      padding: .3rem .7rem;
      font-size: .8rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    #btn-back:hover { border-color: #aaa; color: #fff; }

    #book-title {
      flex: 1;
      font-size: .9rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* TOC 下拉 */
    #toc-select {
      background: #222;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      padding: .3rem .5rem;
      font-size: .8rem;
      max-width: 220px;
      cursor: pointer;
    }
    #toc-select:focus { outline: none; border-color: #888; }

    /* ── 主体 ── */
    #reader-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #f5f5f0;
    }

    #viewer {
      width: 100%;
      height: 100%;
    }

    /* 翻页按钮 */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,.25);
      border: none;
      color: #fff;
      font-size: 1.8rem;
      width: 44px;
      height: 80px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .nav-btn:hover { background: rgba(0,0,0,.5); }
    #btn-prev { left: 8px; }
    #btn-next { right: 8px; }

    /* ── 底部进度条 ── */
    #footer {
      padding: .4rem 1rem;
      background: #111;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-shrink: 0;
      font-size: .75rem;
      color: #888;
    }
    #progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: #e87722;
      width: 0%;
      transition: width .3s;
    }
    #progress-label { white-space: nowrap; }

    /* 加载遮罩 */
    #loading {
      position: absolute;
      inset: 0;
      background: #f5f5f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #555;
      font-size: .9rem;
      z-index: 20;
    }
    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #ddd;
      border-top-color: #e87722;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }

    /* 错误提示 */
    #error-msg {
      display: none;
      position: absolute;
      inset: 0;
      background: #f5f5f0;
      color: #c00;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: .75rem;
      font-size: .9rem;
      z-index: 20;
      padding: 2rem;
      text-align: center;
    }
    #error-msg.visible { display: flex; }
  </style>
</head>
<body>

<div id="toolbar">
  <a id="btn-back" href="index.html">← 返回</a>
  <span id="book-title">加载中…</span>
  <select id="toc-select" title="章节目录">
    <option>目录</option>
  </select>
</div>

<div id="reader-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <span>正在加载…</span>
  </div>
  <div id="error-msg"></div>

  <div id="viewer"></div>

  <button class="nav-btn" id="btn-prev" title="上一页">‹</button>
  <button class="nav-btn" id="btn-next" title="下一页">›</button>
</div>

<div id="footer">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <span id="progress-label">0%</span>
</div>

<script>
  const params   = new URLSearchParams(location.search);
  const bookFile = params.get('book');

  if (!bookFile) { location.href = 'index.html'; }

  const title = bookFile.replace('.epub', '');
  document.title = title + ' — 好奇心日报';
  document.getElementById('book-title').textContent = title;

  function hideLoading() {
    document.getElementById('loading').classList.add('hidden');
  }

  function showError(msg) {
    hideLoading();
    const el = document.getElementById('error-msg');
    el.innerHTML = `<div>⚠️ ${msg}</div>
      <a href="index.html" style="color:#555;font-size:.8rem">← 返回列表</a>`;
    el.classList.add('visible');
  }

  // 自行 fetch，把 ArrayBuffer 直接传给 epub.js，绕过其内部 URL 处理
  // encodeURIComponent 处理中文文件名和空格
  fetch(encodeURIComponent(bookFile))
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.arrayBuffer();
    })
    .then(buffer => openBook(buffer))
    .catch(err => showError('文件加载失败：' + err.message));

  function openBook(buffer) {
    const book = ePub(buffer);

    const rendition = book.renderTo('viewer', {
      width: '100%',
      height: '100%',
      spread: 'none',
      flow: 'paginated',
    });

    const loadingTimeout = setTimeout(hideLoading, 10000);

    rendition.on('rendered', () => {
      clearTimeout(loadingTimeout);
      hideLoading();
    });

    rendition.display().catch(err => {
      clearTimeout(loadingTimeout);
      showError('渲染失败：' + (err && err.message || err));
    });

    // 目录
    book.loaded.navigation.then(nav => {
      const select = document.getElementById('toc-select');
      select.innerHTML = '<option value="">— 目录 —</option>';
      (nav.toc || []).forEach(item => {
        const opt = document.createElement('option');
        opt.value = item.href;
        opt.textContent = item.label.trim();
        select.appendChild(opt);
      });
      select.addEventListener('change', () => {
        if (select.value) rendition.display(select.value);
      });
    }).catch(() => {});

    // 进度
    book.ready.then(() => book.locations.generate(1024)).then(() => {
      rendition.on('relocated', location => {
        const pct = book.locations.percentageFromCfi(location.start.cfi);
        if (pct != null) {
          const p = Math.round(pct * 100);
          document.getElementById('progress-bar').style.width = p + '%';
          document.getElementById('progress-label').textContent = p + '%';
        }
      });
    }).catch(() => {});

    // 翻页
    document.getElementById('btn-prev').addEventListener('click', () => rendition.prev());
    document.getElementById('btn-next').addEventListener('click', () => rendition.next());

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  rendition.prev();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') rendition.next();
    });
    rendition.on('keydown', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  rendition.prev();
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') rendition.next();
    });
  }
</script>
</body>
</html>
